<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Forget Me Not Dementia Companion</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#e9f5ff;
  margin:0;
}

.app {
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

.nav {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.nav button {
  padding:10px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  background:#ddd;
}

.nav button.active {
  background:#0c6c8b;
  color:#fff;
}

.section {
  display:none;
}

.section.active {
  display:block;
}

textarea {
  width:100%;
  min-height:100px;
  margin-top:10px;
}

.btn {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#0c6c8b;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="app">

<h2>🌼 Forget Me Not Companion</h2>

<div class="nav">
  <button onclick="showSection('home')" id="homeBtn">Home</button>
  <button onclick="showSection('toolkit')" id="toolkitBtn">Dementia Toolkit</button>
  <button onclick="showSection('library')" id="libraryBtn">Dementia Library</button>
  <button onclick="showSection('crisis')" id="crisisBtn">Crisis Help</button>
  <button onclick="showSection('support')" id="supportBtn">Chat & Stories</button>
</div>

<div id="home" class="section active">
  <p>Welcome 🌼</p>
</div>

<div id="toolkit" class="section">
  <p>Toolkit coming soon</p>
</div>

<div id="library" class="section">
  <p>Library coming soon</p>
</div>

<div id="crisis" class="section">
  <p>If urgent help is needed, contact emergency services or NHS 111.</p>
</div>

<div id="support" class="section">
  <h3>Chat & Stories</h3>

  <a class="btn" href="mailto:your-email@example.com">Email Odette</a>

  <h4>Share your story</h4>

  <textarea id="story"></textarea>

  <button class="btn" onclick="saveStory()">Save</button>
</div>

</div>

<script>

function showSection(section) {

  const sections = document.querySelectorAll('.section');
  const buttons = document.querySelectorAll('.nav button');

  sections.forEach(s => s.classList.remove('active'));
  buttons.forEach(b => b.classList.remove('active'));

  document.getElementById(section).classList.add('active');
  document.getElementById(section + 'Btn').classList.add('active');
}

function saveStory(){
  const text = document.getElementById('story').value;
  localStorage.setItem('story', text);
  alert("Saved 💙");
}

window.onload = function(){
  const saved = localStorage.getItem('story');
  if(saved){
    document.getElementById('story').value = saved;
  }
}

</script>

</body>
</html>
